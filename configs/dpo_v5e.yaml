# ─── Tunix DPO config for TPU v5e-8 (us-west4-a) ────────────────────────────
# Override any field via CLI:  tunix-train --config configs/dpo_v5e.yaml training.beta=0.05

model:
  model_name:    google/gemma-3-1b-it      # text-only, instruction-tuned, 32K context
  max_seq_len:   1024
  dtype:         bfloat16

training:
  beta:                       0.1
  learning_rate:              1.0e-5
  lr_schedule:                cosine
  warmup_steps:               100
  num_epochs:                 1
  per_device_batch_size:      8             # ⇒ global batch 64 on v5e-8
  gradient_accumulation_steps: 1
  sft_loss_weight:            0.0
  log_sft_loss:               true
  max_grad_norm:              1.0
  weight_decay:               0.01

data:
  data_dir:    ./data/dpo
  train_file:  train.jsonl
  eval_file:   test.jsonl
  num_workers: 4

infra:
  gcs_bucket:             gs://your-project-tunix-checkpoints
  checkpoint_dir:         checkpoints/dpo_v5e_run
  checkpoint_every_steps: 500
  log_dir:                logs/dpo_v5e_run
  log_every_steps:        10
  eval_every_steps:       250
  seed:                   42